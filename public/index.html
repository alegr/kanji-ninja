<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kanji Ronin: JLPT Study</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0e1117;
    color: #e8e8f0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 24px;
  }
  .card {
    max-width: 420px;
    text-align: center;
  }
  .logo {
    font-size: 36px;
    font-weight: 800;
    margin-bottom: 8px;
  }
  .logo span { color: #ff6b6b; }
  .tagline {
    color: #9090b0;
    font-size: 16px;
    margin-bottom: 32px;
  }
  .app-store {
    display: inline-block;
    background: #fff;
    color: #000;
    font-size: 16px;
    font-weight: 700;
    padding: 14px 28px;
    border-radius: 12px;
    text-decoration: none;
    margin-bottom: 32px;
    transition: opacity 0.2s;
  }
  .app-store:hover { opacity: 0.85; }
  .links {
    display: flex;
    gap: 16px;
    justify-content: center;
  }
  .links a {
    color: #9090b0;
    font-size: 13px;
    text-decoration: none;
  }
  .links a:hover { color: #e8e8f0; }
</style>
</head>
<body>
<div class="card">
  <div class="logo"><span>漢字</span> Ronin</div>
  <p class="tagline">Master kanji. One day at a time.</p>
  <a class="app-store" href="https://apps.apple.com/app/id6761014365">Download on the App Store</a>
  <div class="links">
    <a href="/privacy">Privacy Policy</a>
    <a href="/terms">Terms of Use</a>
  </div>
</div>
</body>
</html>
